name: citra-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - win-7-clean

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          ref: win-7
          
      - name: Set up cache
        uses: actions/cache@v6
        with:
          path: ~/.buildcache
          key: ${{ runner.os }}-win-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-win-

      - name: Install Visual Studio platform toolset v142
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\setup.exe" modify --quiet --norestart --includeRecommended --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" --channelId VisualStudio.16.Release --add Microsoft.VisualStudio.Component.VC.14.29.16.11.x86.x64
          
      - name: Download Qt
        run: git clone https://github.com/${{ github.repository_owner }}/Qt-Win-Shared C:/Qt
        
      - name: Install dependencies
        run: ./.ci/windows-msvc/deps.sh
        shell: bash
        
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.29
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        
      - name: Build
        run: ./.ci/windows-msvc/build.sh
        shell: bash
        env:
          ENABLE_COMPATIBILITY_REPORTING: "ON"
          
      - name: Pack
        run: ./.ci/windows-msvc/upload.ps1
        
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: msvc
          path: artifacts/
          if-no-files-found: error
          retention-days: 1
          include-hidden-files: true
